llm:
  provider: openai
  model: deepseek-v4-pro
  api_key: ""
  base_url: https://api.openai.com/v1
  temperature: 0
  max_tokens: 1200
  offline_fallback: true

embedding:
  # Options: openai / ollama / hash
  # Recommended local Chinese retrieval setup:
  #   provider: ollama
  #   model: bge-m3
  #   base_url: http://localhost:11434
  provider: ollama
  model: bge-m3
  api_key: ""
  base_url: http://localhost:11434
  offline_fallback: true

rag:
  chunk_size: 600
  chunk_overlap: 80
  top_k: 8
  rerank_top_k: 4
  collection_name: pharmassist

agent:
  default_strategy: decompose
  high_risk_requires_review: true
  min_evidence_count: 1

server:
  host: 0.0.0.0
  port: 8000

logging:
  level: INFO
  dir: logs
  file: pharmassist.log
  max_bytes: 2000000
  backup_count: 3

knowledge_base:
  docs_path: data/knowledge
  persist_dir: data/chroma_db
